<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>API Dashboard</title>

  <link rel="stylesheet" href="assets/css/dashboard.css"/>
</head>

<body>
  <div class="layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="sidebar__logo">API HUB</div>

      <nav class="sidebar__menu">

        <div class="sidebar-item active">
          <span>🏠</span>
          <span>Dashboard</span>
        </div>

        <div class="sidebar-item">
          <span>📡</span>
          <span>API Services</span>
          <span class="badge badge--blue">API</span>
        </div>

        <div class="sidebar-item">
          <span>🔗</span>
          <span>Integrations</span>
        </div>

        <div class="sidebar-item">
          <span>📄</span>
          <span>Docs</span>
        </div>

      </nav>
    </aside>

    <!-- MAIN -->
    <div class="main">

      <!-- TOPBAR -->
      <header class="topbar">
        <div class="topbar__left">
          <h1>UC / PBX — API Marketplace</h1>
        </div>

        <div class="topbar__right">

          <input 
            id="searchInput"
            type="text"
            placeholder="Search API..."
            aria-label="Search API"
          />

          <button id="toggleSidebar" class="btn-ghost">☰</button>

        </div>
      </header>

      <!-- CONTENT -->
      <main class="content">

        <section class="card-grid" id="cardContainer"></section>

      </main>

    </div>

  </div>

  <script src="assets/js/dashboard.js"></script>
</body>
</html>
