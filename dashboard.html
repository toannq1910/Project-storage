<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<link rel="stylesheet" href="assets/css/dashboard.css">

<!-- Chart.js -->
<script src="assets/js/chart.js"></script>

</head>
<body>

<div class="layout">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div style="display:flex;justify-content:space-between;align-items:center;">
  <h2>FTI Hub</h2>
  <button onclick="toggleSidebar()" style="background:none;border:none;color:white;cursor:pointer;">☰</button>
    </div>

    <ul id="menu">
      <li data-page="home">Dashboard Tổng Quan</li>
      <li data-page="market">Thị Trường VN</li>
      <li data-page="stakeholder">Stakeholder × Ngành</li>
      <li data-page="competitor">Phân Tích Đối Thủ</li>
    </ul>

    <div class="user-box">
      <p id="sidebarUser"></p>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <div class="topbar">
      <h3 id="pageTitle">Dashboard</h3>

      <input type="text" id="searchInput" placeholder="Tìm kiếm..." />

      <div>
        <span id="headerUser"></span>
        <button onclick="logout()">Đăng xuất</button>
      </div>
    </div>

    <div class="content" id="contentArea"></div>

  </div>
</div>

<script src="assets/js/dashboard.js"></script>

</body>
</html>
