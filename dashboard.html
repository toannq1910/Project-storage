<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<link rel="stylesheet" href="assets/css/dashboard.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<script>
  const user = JSON.parse(localStorage.getItem("currentUser"));
  if (!user) {
    window.location.href = "index.html";
  }
</script>

<div class="layout">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>FTI Presales Hub</h2>

    <ul id="menu">
      <li data-page="home">Dashboard Tổng Quan</li>
      <li data-page="market">Thị Trường VN</li>
      <li data-page="stakeholder">Stakeholder × Ngành</li>
      <li data-page="competitor">Phân Tích Đối Thủ</li>
      <li id="adminMenu" data-page="admin" style="display:none;">Quản Trị Hệ Thống</li>
    </ul>

    <div class="user-box">
      <p id="sidebarUser"></p>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <div class="topbar">
      <h3 id="pageTitle">Dashboard</h3>

      <input type="text" id="searchInput" placeholder="Tìm kiếm..." />

      <div>
        <span id="headerUser"></span>
        <button onclick="logout()">Đăng xuất</button>
      </div>
    </div>

    <!-- CONTENT AREA -->
    <div class="content" id="contentArea"></div>

  </div>
</div>

<script src="assets/js/dashboard.js"></script>

</body>
</html>
